<!DOCTYPE html>
<html lang="en">
<head>

    <title>Holdings 4 Land | Affordable Vacant Land Ownership</title>
    <style>
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            line-height: 1.6; margin: 0; padding: 20px; color: #2d3748; 
            /* רקע ירוק טבעי מדורג - עובד תמיד */
            background: linear-gradient(135deg, #e6fffa 0%, #f0fff4 100%);
            background-attachment: fixed;
        }
        .container { max-width: 900px; margin: auto; background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid #c6f6d5; }

        .cta-button { display: inline-block; background: #276749; color: white; padding: 18px 40px; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 1.2em; transition: 0.3s; margin: 10px; }
        .cta-button:hover { background: #1c4532; transform: translateY(-3px); }
        .form-button { background: #2563eb; }
        .form-button:hover { background: #1d4ed8; }

    <div class="container">

        </div>
        <div class="button-group">
            <a href="land-for-sale.html" class="cta-button">Browse Available Properties</a>
            <a href="https://docs.google.com" target="_blank" class="cta-button form-button">Get Land Information</a>

        <footer>
